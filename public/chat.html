<!DOCTYPE html>
<html lang="es" class="light">

<head>
  <meta charset="UTF-8" />
  <title>BerryBot Chat</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />


  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link href="dist/output.css" rel="stylesheet">
</head>

<body class="bg-gray-100 dark:bg-[#1f1315] text-slate-900 dark:text-white font-[Lexend] flex">

  <!-- SIDEBAR -->
  <div
    class="w-64 min-h-screen bg-white dark:bg-[#2d1a1e] border-r border-slate-200 dark:border-white/10 fixed left-0 top-0 flex flex-col">

    <div class="p-6 border-b border-slate-200 dark:border-white/10">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#8d2036] rounded-2xl flex items-center justify-center text-white font-bold text-2xl">
          B
        </div>

        <div class="font-semibold text-xl text-[#8d2036]">
          BerryBot
        </div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">

      <a href="dashboard.html"
        class="block px-4 py-3 rounded-xl hover:bg-slate-100 dark:hover:bg-white/5 transition-colors">
        Inicio
      </a>

      <a href="chat.html" class="block px-4 py-3 rounded-xl bg-[#8d2036]/10 text-[#8d2036] font-medium">
        BerryBot Chat
      </a>

    </nav>

    <div class="p-4 border-t border-slate-200 dark:border-white/10">
      <button class="w-full px-4 py-3 text-red-600 hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors">
        Cerrar sesión
      </button>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="ml-64 flex-1 flex flex-col">

    <!-- HEADER -->
    <header
      class="bg-white dark:bg-[#2d1a1e] border-b border-slate-200 dark:border-white/10 px-8 py-5 flex justify-between items-center">
      <h1 class="text-xl font-bold text-[#8d2036] dark:text-white">
        BerryBot Chat
      </h1>

      <div class="flex items-center gap-6">
        <button onclick="toggleDark()" class="text-2xl">
          <span id="dark-icon" class="material-symbols-outlined">dark_mode</span>
        </button>

        <div class="flex items-center gap-3">
          <div id="hd-avatar"
            class="w-9 h-9 bg-[#8d2036] text-white rounded-2xl flex items-center justify-center font-bold text-sm">
          </div>
          <div>
            <div id="hd-name" class="font-semibold text-sm"></div>
            <div class="text-xs text-slate-500 dark:text-slate-400">Estudiante</div>
          </div>
        </div>
      </div>

    </header>

    <!-- CHAT -->
    <section class="flex flex-col flex-1 max-w-2xl mx-auto w-full p-4">

      <!-- MENSAJES -->
      <div id="chatbot-messages"
        class="flex-1 overflow-y-auto bg-white dark:bg-[#2d1a1e] rounded-3xl border-t-4 border-[#8d2036] shadow p-4 space-y-3 h-[500px]">
      </div>

      <!-- INPUT -->
      <div class="mt-4 flex gap-2">

        <input type="text" id="chatbot-input" placeholder="Escribe tu mensaje..."
          class="flex-1 p-3 rounded-2xl border border-[#8d2036] bg-white dark:bg-[#2d1a1e] dark:text-white outline-none focus:outline-none focus:border-[#8d2036] focus:ring-0 focus:shadow-none" />
        <button id="chatbot-send" class="bg-red-800 text-white px-4 rounded-xl hover:bg-red-900 transition">
          Enviar
        </button>

      </div>

    </section>

  </div>


  <!-- JS -->
  <script src="js/script.js"></script>
  <script src="js/controllers/chatbotController.js"></script>

</body>

</html>
