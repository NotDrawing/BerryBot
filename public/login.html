<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerryBot - Iniciar Sesión</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-gray-50 dark:bg-[#1f1315] min-h-screen font-sans">

    <!-- Header superior -->
    <div class="flex justify-between items-center px-8 py-6">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-[#8d2036] rounded-2xl flex items-center justify-center text-white font-bold text-2xl">
                <span class="material-symbols-outlined text-white text-5xl">school</span>
            </div>
            <div>
                <span class="text-[#8d2036] dark:text-white font-semibold text-xl">UES Hermosillo</span>
            </div>
        </div>

        <!-- Icono Dark Mode -->
        <button onclick="toggleDark()"
            class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-white/10 transition-colors">
            <span id="dark-icon" class="material-symbols-outlined text-2xl text-[#8d2036] dark:text-white">
                dark_mode
            </span>
        </button>
    </div>

    <div class="max-w-md mx-auto mt-8 px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-[#8d2036] rounded-3xl mb-4 shadow-xl">
                <span class="material-symbols-outlined text-white text-5xl">smart_toy</span>
            </div>
            <h1 class="text-4xl font-bold text-[#8d2036] dark:text-white">BerryBot</h1>
            <p class="text-slate-600 dark:text-slate-400 mt-2">Portal de Acceso Universitario</p>
        </div>

        <!-- Card principal -->
        <div class="bg-white dark:bg-[#2d1a1e] rounded-3xl shadow-2xl overflow-hidden">

            <!-- Tabs -->
            <div class="tab-container">
                <button onclick="switchTab('login')" id="tab-login" class="tab-btn active">
                    Iniciar Sesión
                </button>
                <button onclick="switchTab('register')" id="tab-register" class="tab-btn">
                    Registrarse
                </button>
            </div>

            <!-- Contenido -->
            <div class="p-8">

                <!-- PANEL LOGIN -->
                <div id="panel-login" class="tab-content">
                    <button id="google-login-btn"
                        class="w-full flex items-center justify-center gap-3 border border-slate-300 dark:border-white/20 rounded-2xl py-3.5 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google" class="w-5 h-5">
                        <span class="font-medium text-slate-700 dark:text-slate-200">Continuar con Google</span>
                    </button>

                    <div class="my-6 flex items-center gap-4">
                        <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                        <span class="text-xs uppercase tracking-widest text-slate-400">o con correo</span>
                        <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                    </div>

                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm text-slate-600 dark:text-slate-400 mb-1.5">Correo
                                electrónico</label>
                            <input id="login-email" type="email" class="input-custom" placeholder="correo@ues.mx">
                        </div>
                        <div>
                            <label class="block text-sm text-slate-600 dark:text-slate-400 mb-1.5">Contraseña</label>
                            <input id="login-pass" type="password" class="input-custom" placeholder="••••••••">
                        </div>

                        <button onclick="handleLogin()" class="btn btn-primary w-full py-4 text-base font-semibold">
                            Entrar a BerryBot
                        </button>
                    </div>
                </div>

                <!-- PANEL REGISTRO -->
                <div id="panel-register" class="tab-content hidden">
                    <button onclick="handleGoogle()"
                        class="w-full flex items-center justify-center gap-3 border border-slate-300 dark:border-white/20 rounded-2xl py-3.5 hover:bg-slate-50 dark:hover:bg-white/5 transition-all">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google" class="w-5 h-5">
                        <span class="font-medium text-slate-700 dark:text-slate-200">Registrarse con Google</span>
                    </button>

                    <div class="my-6 flex items-center gap-4">
                        <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                        <span class="text-xs uppercase tracking-widest text-slate-400">o llena el formulario</span>
                        <div class="h-px flex-1 bg-slate-200 dark:bg-white/10"></div>
                    </div>

                    <div class="space-y-5">
                        <div class="grid grid-cols-2 gap-4">
                            <div><input id="reg-nombre" type="text" class="input-custom" placeholder="Nombre(s)"></div>
                            <div><input id="reg-apellido" type="text" class="input-custom" placeholder="Apellidos">
                            </div>
                        </div>

                        <div>
                            <input id="reg-expediente" type="text" class="input-custom"
                                placeholder="Número de Expediente">
                        </div>

                        <div>
                            <input id="reg-email" type="email" class="input-custom" placeholder="Correo electrónico">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div><input id="reg-pass" type="password" class="input-custom" placeholder="Contraseña">
                            </div>
                            <div><input id="reg-pass2" type="password" class="input-custom" placeholder="Confirmar">
                            </div>
                        </div>

                        <div class="flex items-center gap-2 text-sm">
                            <input type="checkbox" id="terms" class="w-4 h-4 accent-[#8d2036]">
                            <label for="terms" class="text-slate-600 dark:text-slate-400">
                                Acepto los términos y condiciones
                            </label>
                        </div>

                        <button onclick="handleRegister()" class="btn btn-primary w-full py-4 text-base font-semibold">
                            Crear Cuenta
                        </button>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-slate-500 dark:text-slate-400">
            © 2026 Universidad Estatal de Sonora. Todos los derechos reservados.
        </div>
    </div>

    <script src="./js/script.js"></script>

    <script type="module">
        import { handleLogin, handleRegister, handleGoogle } from './js/controllers/authController.js';

        // Asignar eventos con addEventListener en lugar de onclick
        window.addEventListener('DOMContentLoaded', () => {
            const googleBtn = document.getElementById('google-login-btn');
            if (googleBtn) {
                googleBtn.addEventListener('click', handleGoogle);
            }

            const loginBtn = document.querySelector('#panel-login .btn-primary');
            if (loginBtn) {
                loginBtn.addEventListener('click', handleLogin);
            }

            const registerBtn = document.querySelector('#panel-register .btn-primary');
            if (registerBtn) {
                registerBtn.addEventListener('click', handleRegister);
            }
        });

        // Exponer para compatibilidad
        window.handleLogin = handleLogin;
        window.handleRegister = handleRegister;
        window.handleGoogle = handleGoogle;
    </script>
</body>

</html>
