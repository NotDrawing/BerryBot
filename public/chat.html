<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>BerryBot Chat</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css" />

  <!-- Fuente -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Tailwind -->
  <link href="dist/output.css" rel="stylesheet">
</head>

<body class="bg-gray-100 font-[Lexend] flex">

  <!-- SIDEBAR -->
  <div class="w-64 min-h-screen bg-white border-r fixed left-0 top-0 flex flex-col">

    <div class="p-6 border-b">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 bg-[#8d2036] rounded-2xl flex items-center justify-center text-white font-bold text-2xl">
          B
        </div>
        <div class="font-semibold text-xl text-[#8d2036]">BerryBot</div>
      </div>
    </div>

    <nav class="flex-1 p-4 space-y-1">
      <a href="dashboard.html" class="block px-4 py-3 rounded-xl bg-[#8d2036]/10 text-[#8d2036] font-medium">
        Inicio
      </a>

      <a href="berrybot-chat.html" class="block px-4 py-3 rounded-xl hover:bg-gray-100">
        BerryBot Chat
      </a>
    </nav>

    <div class="p-4 border-t">
      <button class="w-full px-4 py-3 text-red-600 hover:bg-red-50 rounded-xl">
        Cerrar sesión
      </button>
    </div>

  </div>

  <!-- CONTENIDO -->
  <div class="ml-64 flex-1 flex flex-col">

    <!-- HEADER -->
    <header class="bg-white shadow p-4 flex justify-between items-center">
      <h1 class="text-xl font-bold text-gray-800">BerryBot Chat</h1>

      <a href="dashboard.html" class="hover:underline font-medium">
        Volver al Dashboard
      </a>
    </header>

    <!-- CHAT -->
    <section class="flex flex-col flex-1 max-w-2xl mx-auto w-full p-4">

      <!-- MENSAJES -->
      <div 
        id="chatbot-messages"
        class="flex-1 overflow-y-auto bg-gray-100 rounded-xl border-t-4 border-red-800 shadow p-4 space-y-3"
      >
      </div>

      <!-- INPUT -->
      <div class="mt-4 flex gap-2">
        <input 
          type="text" 
          id="chatbot-input" 
          placeholder="Escribe tu mensaje..." 
          class="flex-1 p-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-red-900"
        />

        <button class="bg-red-800 text-white px-4 rounded-xl hover:bg-red-900 transition">
          Enviar
        </button>
      </div>

    </section>

  </div>

  <!-- SCRIPT MENSAJE INICIAL -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const messages = document.getElementById('chatbot-messages');

      const welcome = document.createElement('div');
      welcome.className = 'bg-red-100 text-red-900 p-3 rounded-xl max-w-max';
      welcome.textContent = 'Hola, ¿en qué puedo ayudarte?';

      messages.appendChild(welcome);
    });
  </script>

  <!-- JS -->
  <script src="js/chatbot.js"></script>

</body>
</html>
