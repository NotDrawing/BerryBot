<!DOCTYPE html>
<html lang="es" class="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BerryBot - Completa tu Perfil</title>
    <link rel="stylesheet" href="./dist/output.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>

<body class="bg-gray-50 dark:bg-[#1f1315] min-h-screen font-sans">

    <!-- Header superior -->
    <div class="flex justify-between items-center px-8 py-6">
        <div class="flex items-center gap-3">
            <div
                class="w-10 h-10 bg-[#8d2036] rounded-2xl flex items-center justify-center text-white font-bold text-2xl">
                B
            </div>
            <div>
                <span class="text-[#8d2036] dark:text-white font-semibold text-xl">UES Hermosillo</span>
            </div>
        </div>

        <!-- Icono Dark Mode -->
        <button onclick="toggleDark()"
            class="w-11 h-11 flex items-center justify-center rounded-2xl hover:bg-white/10 transition-colors">
            <span id="dark-icon" class="material-symbols-outlined text-2xl text-[#8d2036] dark:text-white">
                dark_mode
            </span>
        </button>
    </div>

    <div class="max-w-md mx-auto mt-4 px-6 pb-12">
        <div class="text-center mb-8">
            <!-- Avatar placeholder con inicial de Google -->
            <div class="inline-flex items-center justify-center w-20 h-20 bg-[#8d2036] rounded-3xl mb-4 shadow-xl">
                <span class="material-symbols-outlined text-white text-5xl">person</span>
            </div>
            <h1 class="text-3xl font-bold text-[#8d2036] dark:text-white">¡Bienvenido!</h1>
            <p id="welcome-email" class="text-slate-500 dark:text-slate-400 mt-1 text-sm"></p>
            <p class="text-slate-600 dark:text-slate-300 mt-3 text-base">
                Completa tu perfil para continuar
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white dark:bg-[#2d1a1e] rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-8 space-y-5">

                <!-- Mensaje informativo -->
                <div class="flex items-start gap-3 bg-[#8d2036]/8 dark:bg-[#8d2036]/15 rounded-2xl p-4">
                    <span class="material-symbols-outlined text-[#8d2036] text-xl mt-0.5">info</span>
                    <p class="text-sm text-slate-600 dark:text-slate-300 leading-relaxed">
                        Solo necesitamos algunos datos adicionales para crear tu cuenta universitaria.
                    </p>
                </div>

                <!-- Nombre -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1.5">
                        Nombre(s) <span class="text-[#8d2036]">*</span>
                    </label>
                    <input id="cp-nombre" type="text" class="input-custom" placeholder="Ej. María José"
                        autocomplete="given-name">
                </div>

                <!-- Apellidos -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1.5">
                        Apellidos <span class="text-[#8d2036]">*</span>
                    </label>
                    <input id="cp-apellido" type="text" class="input-custom" placeholder="Ej. García López"
                        autocomplete="family-name">
                </div>

                <!-- Número de Expediente -->
                <div>
                    <label class="block text-sm font-medium text-slate-600 dark:text-slate-400 mb-1.5">
                        Número de Expediente <span class="text-[#8d2036]">*</span>
                    </label>
                    <input id="cp-expediente" type="text" class="input-custom" placeholder="Ej. 2023-0001"
                        autocomplete="off">
                </div>

                <!-- Mensaje de error -->
                <div id="cp-error"
                    class="hidden items-center gap-2 text-red-600 bg-red-50 dark:bg-red-950/30 rounded-xl px-4 py-3 text-sm">
                    <span class="material-symbols-outlined text-base">error</span>
                    <span id="cp-error-msg"></span>
                </div>

                <!-- Botón -->
                <button id="cp-btn" onclick="saveProfile()"
                    class="btn btn-primary w-full py-4 text-base font-semibold flex items-center justify-center gap-2">
                    <span id="cp-btn-text">Guardar y entrar</span>
                    <span id="cp-btn-icon" class="material-symbols-outlined text-xl">arrow_forward</span>
                    <span id="cp-btn-loader" class="hidden">
                        <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                            </circle>
                            </circle>
                            <path class="opacity-75" fill="currentColor"
                                d="M4 12a8 8 0 018-8V0C5.373 0 12 0 12 0v4a4 4 0 00-4 4H4z"></path>
                        </svg>
                    </span>
                </button>

            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-xs text-slate-500 dark:text-slate-400">
            © 2026 Universidad Estatal de Sonora. Todos los derechos reservados.
        </div>
    </div>

    <script src="./js/script.js"></script>

    <script type="module">
        import { initCompleteProfile, saveProfile } from './js/controllers/completeProfileController.js';
        window.saveProfile = saveProfile;
        initCompleteProfile();
    </script>
</body>

</html>
